<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" role="img" aria-labelledby="title description">
  <title id="title">Workshop learning flow</title>
  <desc id="description">Four connected stages labelled Explain, Demonstrate, Practise, and Reflect.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#8a929a"/>
    </marker>
  </defs>
  <rect width="960" height="240" rx="18" fill="#202225"/>
  <g font-family="sans-serif" font-size="24" text-anchor="middle">
    <g fill="none" stroke="#8a929a" stroke-width="4" marker-end="url(#arrow)">
      <path d="M220 120H290"/>
      <path d="M460 120H530"/>
      <path d="M700 120H770"/>
    </g>
    <g>
      <rect x="40" y="70" width="180" height="100" rx="14" fill="#2b3035" stroke="#3473ad" stroke-width="3"/>
      <text x="130" y="128" fill="#f1f1f1">Explain</text>
    </g>
    <g>
      <rect x="280" y="70" width="180" height="100" rx="14" fill="#2b3035" stroke="#3473ad" stroke-width="3"/>
      <text x="370" y="128" fill="#f1f1f1">Demonstrate</text>
    </g>
    <g>
      <rect x="520" y="70" width="180" height="100" rx="14" fill="#2b3035" stroke="#3473ad" stroke-width="3"/>
      <text x="610" y="128" fill="#f1f1f1">Practise</text>
    </g>
    <g>
      <rect x="760" y="70" width="160" height="100" rx="14" fill="#2b3035" stroke="#3473ad" stroke-width="3"/>
      <text x="840" y="128" fill="#f1f1f1">Reflect</text>
    </g>
  </g>
</svg>
